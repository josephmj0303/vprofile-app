name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  HELM_REPO_NAME: ${{ vars.HELM_REPO_NAME }}
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

jobs:
  
  # Enforce SonarQube quality gates in PR workflow

  build-and-sonar:
    if: github.event_name == 'pull_request'
    name: Build, Test, Checkstyle & SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache Sonar scanner cache
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('sonar-project.properties') }}
          restore-keys: |
            ${{ runner.os }}-sonar-

      - name: Build, run unit tests, and generate Checkstyle report
        run: mvn clean verify checkstyle:checkstyle -B

      - name: Run SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube quality gate check
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          pollingTimeoutSec: 600

  # Integrate ECR Repository

  docker-build-push:
    if: github.event_name == 'push'
    name: Build Docker image and push to ECR
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.set-outputs.outputs.ecr_registry }}
      ecr_image: ${{ steps.set-outputs.outputs.ecr_image }}
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Create ECR repository if needed
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Build and push Docker images
        id: set-outputs
        run: |
          ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com
          IMAGE_TAG=${GITHUB_SHA::7}
          IMAGE_NAME=${ECR_REGISTRY}/${ECR_REPOSITORY}
          docker build --file Docker-files/app/multistage/Dockerfile --tag ${IMAGE_NAME}:${IMAGE_TAG} .
          docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:latest
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          docker push ${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${IMAGE_NAME}:latest
          echo "ecr_registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "ecr_image=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  # Automate Helm image updates

  update-helm:
    if: github.event_name == 'push'
    name: Update Helm values in separate repo
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6

      - name: Install yq
        run: |
          YQ_VERSION="v4.45.1"
          curl -L "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Clone Helm repository
        run: |
          git clone https://${{ secrets.HELM_REPO_USER }}:${{ secrets.GITOPS_PAT }}@github.com/${{ github.repository_owner }}/${{ env.HELM_REPO_NAME }}.git helm-repo

      - name: Update Helm values.yaml image and tag
        run: |
          cd helm-repo
          yq eval '.app.image = env(ECR_IMAGE) | .app.tag = env(IMAGE_TAG)' -i helm/vprofile/values.yaml
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
          ECR_IMAGE: ${{ needs.docker-build-push.outputs.ecr_image }}

      - name: Commit and push Helm repo update
        run: |
          cd helm-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if ! git diff --quiet; then
            git add helm/vprofile/values.yaml
            git commit -m "Update Helm app.image and app.tag to ${IMAGE_TAG} on main"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: actions@github.com

  # Add slack notification

  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest

    needs:
      - build-and-sonar
      - docker-build-push
      - update-helm

    if: always()

    steps:
      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then

            if [[ "${{ needs.build-and-sonar.result }}" == "success" ]]; then
              STATUS="SUCCESS"
              COLOR="good"
              MESSAGE="✅ Pull Request Validation Passed"
            else
              STATUS="FAILED"
              COLOR="danger"
              MESSAGE="❌ Pull Request Validation Failed"
            fi

          else

            if [[ "${{ needs.docker-build-push.result }}" == "success" && "${{ needs.update-helm.result }}" == "success" ]]; then
              STATUS="SUCCESS"
              COLOR="good"
              MESSAGE="🚀 Deployment Pipeline Completed Successfully"
            else
              STATUS="FAILED"
              COLOR="danger"
              MESSAGE="❌ Deployment Pipeline Failed"
            fi

          fi

          curl --max-time 15 -X POST -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"title\": \"$MESSAGE\",
              \"fields\": [
                {
                  \"title\": \"Repository\",
                  \"value\": \"${{ github.repository }}\",
                  \"short\": true
                },
                {
                  \"title\": \"Branch\",
                  \"value\": \"${{ github.ref_name }}\",
                  \"short\": true
                },
                {
                  \"title\": \"Actor\",
                  \"value\": \"${{ github.actor }}\",
                  \"short\": true
                },
                {
                  \"title\": \"Commit\",
                  \"value\": \"${{ github.sha }}\",
                  \"short\": false
                }
              ]
            }]
          }" \
          $SLACK_WEBHOOK
